# pre-commit configuration — Simples Apuração RTC (F0.4)
#
# Decisão de design (hooks ruff + mypy):
#   - Usamos `repo: local` com `language: system` para ruff e mypy em vez dos
#     repositórios remotos isolados (astral-sh/ruff-pre-commit + mirrors/mypy).
#   - Motivo: ambos requerem que os plugins pydantic.mypy e
#     sqlalchemy.ext.mypy.plugin sejam importáveis no mesmo ambiente Python.
#     Ambientes isolados do pre-commit NÃO herdam o virtualenv/site-packages do
#     projeto, quebrando os plugins.
#   - Consequência: ruff e mypy devem estar instalados no ambiente do projeto
#     (`pip install -e "backend[dev,test]"`) antes de rodar pre-commit.
#   - Versão única: pyproject.toml é a fonte de verdade para as versões.
#
# Instalação inicial (já feita no post-create.sh):
#   pip install -e "backend[dev,test]"
#   pre-commit install
#
# Executar manualmente em todos os arquivos:
#   pre-commit run --all-files

default_language_version:
  python: python3.12

repos:
  # ─────────────────────────────────────────────────────────────────────────
  # Higiene geral de arquivos
  # ─────────────────────────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]

  # ─────────────────────────────────────────────────────────────────────────
  # Ruff — lint + format (backend Python)
  # language: system → usa o ruff instalado via pip install -e "backend[dev]"
  # ─────────────────────────────────────────────────────────────────────────
  - repo: local
    hooks:
      - id: ruff-lint
        name: ruff lint
        language: system
        entry: ruff check --fix
        types: [python]
        files: ^backend/
        pass_filenames: true

      - id: ruff-format
        name: ruff format
        language: system
        entry: ruff format
        types: [python]
        files: ^backend/
        pass_filenames: true

  # ─────────────────────────────────────────────────────────────────────────
  # Mypy — type checking estrito (backend Python)
  # language: system → usa o mypy instalado via pip install -e "backend[dev]"
  # com os plugins pydantic.mypy e sqlalchemy.ext.mypy.plugin acessíveis.
  # ─────────────────────────────────────────────────────────────────────────
  - repo: local
    hooks:
      - id: mypy
        name: mypy (backend)
        language: system
        entry: python -m mypy
        # Sempre checa o diretório backend/ inteiro; pass_filenames: false
        # evita passar arquivos individuais (mypy precisa de contexto completo).
        args: ["--config-file", "backend/pyproject.toml", "backend/"]
        types: [python]
        files: ^backend/
        pass_filenames: false

  # ─────────────────────────────────────────────────────────────────────────
  # Frontend — ESLint + Prettier (F0.5)
  #
  # Decisão de design (espelha o padrão ruff/mypy da F0.4):
  #   - repo: local, language: system → usa os binários instalados em
  #     frontend/node_modules/.bin via npm install.
  #   - ESLint: pass_filenames: false — roda `eslint .` no diretório
  #     frontend/ para evitar problemas de path relativo com o flat config.
  #   - Prettier: pass_filenames: false — roda `prettier --check .` para
  #     verificar formatação; o dev roda `npm run format` para corrigir.
  #   - Pré-requisito: `npm install` dentro de frontend/ (feito pelo
  #     post-create.sh do devcontainer).
  #
  # TODO(F0.6): No CI, adicionar step `npm ci --prefix frontend` antes do
  # pre-commit para garantir que node_modules esteja populado.
  # ─────────────────────────────────────────────────────────────────────────
  - repo: local
    hooks:
      - id: eslint-frontend
        name: eslint (frontend)
        language: system
        entry: bash -c 'cd frontend && node_modules/.bin/eslint .'
        # Passa qualquer arquivo frontend alterado para disparar o hook;
        # o eslint checa o projeto inteiro (pass_filenames: false) para
        # garantir contexto completo do flat config.
        files: ^frontend/
        types_or: [ts, tsx, javascript, jsx]
        pass_filenames: false

      - id: prettier-frontend
        name: prettier check (frontend)
        language: system
        entry: bash -c 'cd frontend && node_modules/.bin/prettier --check .'
        files: ^frontend/
        types_or: [ts, tsx, javascript, jsx, json, css, markdown]
        pass_filenames: false
